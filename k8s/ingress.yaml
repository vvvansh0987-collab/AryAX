apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aryax-ingress
  namespace: aryax
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.aryax.com
        - app.aryax.com
      secretName: aryax-tls
  rules:
    - host: api.aryax.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aryax-api
                port:
                  number: 80
    - host: app.aryax.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aryax-api
                port:
                  number: 80
