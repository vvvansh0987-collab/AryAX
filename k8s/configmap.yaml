apiVersion: v1
kind: ConfigMap
metadata:
  name: aryax-config
  namespace: aryax
data:
  APP_NAME: "AryaX Platform"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://aryax.com,https://app.aryax.com"
  ALLOWED_HOSTS: "aryax.com,app.aryax.com,api.aryax.com"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "1"
  JWT_REFRESH_EXPIRATION_DAYS: "7"
  API_KEY_PREFIX: "sk_live"
  ELASTICSEARCH_INDEX_PREFIX: "aryax"
  REDIS_CACHE_TTL: "300"
  REDIS_SESSION_TTL: "86400"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
