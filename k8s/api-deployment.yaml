apiVersion: v1
kind: Service
metadata:
  name: aryax-api
  namespace: aryax
  labels:
    app: aryax-api
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: aryax-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aryax-api
  namespace: aryax
  labels:
    app: aryax-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aryax-api
  template:
    metadata:
      labels:
        app: aryax-api
    spec:
      serviceAccountName: aryax-api
      containers:
        - name: api
          image: aryax:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            # ConfigMap values
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: aryax-config
                  key: APP_NAME
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: aryax-config
                  key: APP_VERSION
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: aryax-config
                  key: DEBUG
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: aryax-config
                  key: ENVIRONMENT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: aryax-config
                  key: LOG_LEVEL
            # Secret values
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aryax-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aryax-secrets
                  key: REDIS_URL
            - name: ELASTICSEARCH_HOSTS
              valueFrom:
                secretKeyRef:
                  name: aryax-secrets
                  key: ELASTICSEARCH_HOSTS
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aryax-secrets
                  key: JWT_SECRET_KEY
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aryax-secrets
                  key: STRIPE_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aryax-secrets
                  key: OPENAI_API_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aryax-api-hpa
  namespace: aryax
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aryax-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aryax-api
  namespace: aryax
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aryax-api
  namespace: aryax
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aryax-api
  namespace: aryax
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aryax-api
subjects:
  - kind: ServiceAccount
    name: aryax-api
    namespace: aryax
