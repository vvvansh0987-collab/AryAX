services:
  - type: web
    name: aryax-ai
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120 --keep-alive 5
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: JUDGE0_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: CRICKET_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 70
    headers:
      - path: /public/*
        name: Cache-Control
        value: public, max-age=86400
